<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mapa de Auditoria</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            margin: 30px;
            background-color: wheat;
        }

        .contenedor{
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        h2,h3{
            text-align: center;
            margin: 5px;
        }

        hr{
            margin: 20px 0;
        }

        .resultado{
            font-size: 18px;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="contenedor">

<script>

document.write("<h2>REPUBLICA BOLIVARIANA DE VENEZUELA</h2>");
document.write("<h3>INSTITUTO UNIVERSITARIO POLITECNICO 'SANTIAGO MARIÑO'</h3>");
document.write("<h3>EXTENSION MERIDA</h3>");
document.write("<h3>ESCUELA DE INGENIERIA DE SISTEMAS</h3>");
document.write("<h3>Carlos A. Albornoz P.</h3>"); 
document.write("<hr>");
document.write("<h3>ARREGLOS - MAPA DE AUDITORIA</h3>");

let n = parseInt(prompt("Ingrese numero de filas"));
let m = parseInt(prompt("Ingrese numero de columnas:"));

let matriz = [];
let filtrada = [];
let umbral;

umbral = parseInt(prompt("Ingrese el valor umbral:"));

for (let i = 0; i < n; i++) {
    matriz[i] = [];
    filtrada[i] = [];

    for (let j = 0; j < m; j++) {
        matriz[i][j] = parseInt(prompt("Ingresse valor [" + i + "][" + j + "]:"));

        while (isNaN(matriz[i][j])) {
            matriz[i][j] = parseInt(prompt("Dato invalido. Ingrese nuevamente [" + i + "][" + j + "]:"));
        }
    }
}

for (let i = 0; i < n; i++) {
    for (let j = 0; j < m; j++) {

        if (matriz[i][j] >= umbral) {
            filtrada[i][j] = matriz[i][j];
        } else {
            filtrada[i][j] = 0;
        }
    }
}

document.write("<div class='resultado'>");
document.write("<br><strong>Matriz original:</strong><br>");

for (let i = 0; i < n; i++) {
    for (let j = 0; j < m; j++) {
        document.write(matriz[i][j] + " ");
    }
    document.write("<br>");
}

document.write("<br><strong>Matriz filtrada (Umbral " + umbral + "):</strong><br>");

for (let i = 0; i < n; i++) {
    for (let j = 0; j < m; j++) {
        document.write(filtrada[i][j] + " ");
    }
    document.write("<br>");
}

document.write("<br><hr>");
document.write("<strong>Proceso de auditoria completado correctamente.</strong>");
document.write("</div>");

</script>

</div>

</body>
</html>
