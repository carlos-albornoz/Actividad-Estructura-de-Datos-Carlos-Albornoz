<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inversion de Control</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            margin: 30px;
            background-color: wheat;
        }

        .contenedor{
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        h2,h3{
            text-align: center;
            margin: 5px;
        }

        hr{
            margin: 20px 0;
        }

        .resultado{
            font-size: 18px;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="contenedor">

<script>

document.write("<h2>REPUBLICA BOLIVARIANA DE VENEZUELA</h2>");
document.write("<h3>INSTITUTO UNIVERSITARIO POLITECNICO 'SANTIAGO MARIÑO'</h3>");
document.write("<h3>EXTENSION MERIDA</h3>");
document.write("<h3>ESCUELA DE INGENIERIA DE SISTEMAS</h3>");
document.write("<h3>Carlos A. Albornoz P.</h3>"); 
document.write("<hr>");
document.write("<h3>ARREGLOS - INVERSION DE CONTROL</h3>");

let vector = [];
let N;
let temp;

N = parseInt(prompt("Ingrese la cantidad de elementos del vctor:"));

while (N <= 0 || isNaN(N)) {
    N = parseInt(prompt("error. Ingrese una cantidad valida:"));
}

for (let i = 0; i < N; i++) {
    vector[i] = prompt("Ingrese el elemento N° " + (i + 1) + ":");
}

document.write("<div class='resultado'>");
document.write("<br><strong>Vector original:</strong><br>");
for (let i = 0; i < N; i++) {
    document.write("[" + vector[i] + "] ");
}

for (let i = 0; i < N / 2; i++) {
    temp = vector[i];
    vector[i] = vector[N - 1 - i];
    vector[N - 1 - i] = temp;
}

document.write("<br><br><strong>Vector invertido:</strong><br>");
for (let i = 0; i < N; i++) {
    document.write("[" + vector[i] + "] ");
}

document.write("<br><br><hr>");
document.write("<strong>Proceso de inversion realizado correctamente.</strong>");
document.write("</div>");

</script>

</div>

</body>
</html>
