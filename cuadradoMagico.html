<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cuadrado Magico</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            margin: 30px;
            background-color: wheat;
        }

        .contenedor{
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        h2,h3{
            text-align: center;
            margin: 5px;
        }

        hr{
            margin: 20px 0;
        }

        .resultado{
            font-size: 18px;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="contenedor">

<script>

document.write("<h2>REPUBLICA BOLIVARIANA DE VENEZUELA</h2>");
document.write("<h3>INSTITUTO UNIVERSITARIO POLITECNICO 'SANTIAGO MARIÑO'</h3>");
document.write("<h3>EXTENSION MERIDA</h3>");
document.write("<h3>ESCUELA DE INGENIERIA DE SISTEMAS</h3>");
document.write("<h3>Carlos A. Albornoz P.</h3>"); 
document.write("<hr>");
document.write("<h3>ARREGLOS - CUADRADO MAGICO</h3>");

let matriz = [];
let i, j;

for (i = 0; i < 3; i++) {
    matriz[i] = [];
    for (j = 0; j < 3; j++) {
        matriz[i][j] = parseInt(prompt("Ingrese el valor [" + i + "][" + j + "]:"));

        while (isNaN(matriz[i][j])) {
            matriz[i][j] = parseInt(prompt("Dato invalido. Ingrese nuevamente [" + i + "][" + j + "]:"));
        }
    }
}

let sumaFila = [];
let sumaCol = [0, 0, 0];
let diag1 = 0;
let diag2 = 0;

document.write("<div class='resultado'>");
document.write("<br><strong>Matriz ingresada:</strong><br>");

for (i = 0; i < 3; i++) {
    sumaFila[i] = 0;
    for (j = 0; j < 3; j++) {
        document.write(matriz[i][j] + " ");
        sumaFila[i] += matriz[i][j];
        sumaCol[j] += matriz[i][j];
    }
    document.write("<br>");
}

for (i = 0; i < 3; i++) {
    diag1 += matriz[i][i];
    diag2 += matriz[i][2 - i];
}

document.write("<br><strong>Suma de filas:</strong> " + sumaFila + "<br>");
document.write("<strong>Suma de columnas:</strong> " + sumaCol + "<br>");
document.write("<strong>Diagonal principal:</strong> " + diag1 + "<br>");
document.write("<strong>Diagonal secundaria:</strong> " + diag2 + "<br><br>");

let magico = true;

let referencia = sumaFila[0];

for (i = 0; i < 3; i++) {
    if (sumaFila[i] !== referencia || sumaCol[i] !== referencia) {
        magico = false;
    }
}

if (diag1 !== referencia || diag2 !== referencia) {
    magico = false;
}

if (magico) {
    document.write("<h3 style='color:green;'> ES UN CUADRADO MAGICO</h3>");
} else {
    document.write("<h3 style='color:red;'> NO ES UN CUADRADO MAGICO</h3>");
}

document.write("</div>");

</script>

</div>

</body>
</html>
