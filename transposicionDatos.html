<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Transposicion de Matriz</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            margin: 30px;
            background-color: wheat;
        }

        .contenedor{
            background: white;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        h2,h3{
            text-align: center;
            margin: 5px;
        }

        hr{
            margin: 20px 0;
        }

        .resultado{
            font-size: 18px;
            margin-top: 15px;
        }
    </style>
</head>
<body>

<div class="contenedor">

<script>
document.write("<h2>REPUBLICA BOLIVARIANA DE VENEZUELA</h2>");
document.write("<h3>INSTITUTO UNIVERSITARIO POLITECNICO 'SANTIAGO MARIÑO'</h3>");
document.write("<h3>EXTENSION MERIDA</h3>");
document.write("<h3>ESCUELA DE INGENIERIA DE SISTEMAS</h3>");
document.write("<h3>Carlos A. Albornoz P.</h3>"); 
document.write("<hr>");
document.write("<h3>ARREGLOS - TRANSPOSICION DE MATRIZ</h3>");

let n = parseInt(prompt("Ingrese numero de filas:"));
let m = parseInt(prompt("Ingrese numero de columnas:"));

let matriz = [];
let transpuesta = [];


for (let i = 0; i < m; i++) {
    transpuesta[i] = [];
}

for (let i = 0; i < n; i++) {
    matriz[i] = [];
    for (let j = 0; j < m; j++) {
        matriz[i][j] = parseInt(prompt("Ingrese valor [" + i + "][" + j + "]:"));

        while (isNaN(matriz[i][j])) {
            matriz[i][j] = parseInt(prompt("Dato invalido. Ingrese nuevamente [" + i + "][" + j + "]:"));
        }
    }
}

for (let i = 0; i < n; i++) {
    for (let j = 0; j < m; j++) {
        transpuesta[j][i] = matriz[i][j];
    }
}

document.write("<div class='resultado'>");
document.write("<br><strong>Matriz original:</strong><br>");

for (let i = 0; i < n; i++) {
    for (let j = 0; j < m; j++) {
        document.write(matriz[i][j] + " ");
    }
    document.write("<br>");
}

document.write("<br><strong>Matriz trasnspuesta:</strong><br>");

for (let i = 0; i < m; i++) {
    for (let j = 0; j < n; j++) {
        document.write(transpuesta[i][j] + " ");
    }
    document.write("<br>");
}

document.write("<br><hr>");
document.write("<strong>Transposicion realizada correctamente.</strong>");
document.write("</div>");

</script>

</div>

</body>
</html>
